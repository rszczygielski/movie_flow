[Paths]

# RECOMMENDED: Set the media_folder to the directory containing your video file.
# The script will auto-detect the video and subtitle files within this folder.
media_folder = /home/radeksz/Downloads/torrents/

# Optional: Path to the main video file you want to work with
video_file =

# Optional: Path to subtitles if you want to process them without downloading.
# Leave blank to auto-detect a .txt/.srt file next to the video, or to use the newly downloaded one.
subtitle_file =

# Optional: Exact NapiProjekt hash to download subtitles directly without a video file.
napi_hash = 02844ee9afd1766640928812a08a9a0f

[Tasks]
# Master Switches (True/False). Run any combination of tasks independently.
analyze_video = False
transcode_video = False
download_subtitles = True
process_subtitles = False

[VideoSettings]
# Target framerate for subtitle shifting/converting
fps = 23.976

[SubtitleProcessing]
# Subtitle shift in milliseconds (negative = backwards, positive = forward)
# 1 second == 1000 ms
shift_ms = 0

# Processing modules toggles (True/False).
fix_encoding = True
sanitize_text = True
convert_to_srt = True